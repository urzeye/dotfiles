[tools]
# --- 核心工具 ---
go = "1.26.1"
node = "22"
python = "3.14.3"

# --- 可选语言工具链 ---
# 保留在全局配置里，安装完成后会自动被 `mise activate` 接管。
# Linux 默认不装，通过 setup:java / setup:rust 显式安装。
java = "oracle-graalvm-25.0.1"
rust = "latest"

# --- 构建工具 ---
maven = "latest"
pnpm = "latest"
tokei = "latest"
uv = "latest"

# --- 现代终端增强 ---
atuin = "latest"
lazygit = "latest"
starship = "latest"
"github:urzeye/lazyssh" = "latest"

# --- 搜索与导航 ---
fd = "latest"
fzf = "latest"
zoxide = "latest"
ripgrep = "latest"

# --- 文本查看 ---
bat = "latest"

# --- 现代 ls 替代 ---
eza = "latest"

# --- 辅助工具 ---
jq = "latest"
shellcheck = "latest"
actionlint = "latest"
usage = "latest"
gh = "latest"
delta = "latest"
yq = "latest"
just = "latest"
bottom = "latest"
gping = "latest"
tlrc = "latest"
watchexec = "latest"

[env]
# --- 1. Python / pip / uv ---
PIP_INDEX_URL = "https://mirrors.aliyun.com/pypi/simple/"
UV_INDEX_URL = "https://mirrors.aliyun.com/pypi/simple/"

# --- 2. Rust / Cargo ---
CARGO_REGISTRIES_CRATES_IO_PROTOCOL = "sparse"
CARGO_NET_GIT_FETCH_WITH_CLI = "true"

# --- 3. Node.js / npm / pnpm ---
NPM_CONFIG_REGISTRY = "https://registry.npmmirror.com"

# --- 4. Go ---
GOPROXY = "https://goproxy.cn,direct"

# --- 5. pnpm ---
# 使用跨平台目录；同时保留旧的 macOS 路径一段时间，避免现有全局命令失联。
PNPM_HOME = "{{env.HOME}}/.local/share/pnpm"
# 自动将 pnpm / uv tool bin 加入 PATH
_.path = [
	"{{env.HOME}}/.local/share/pnpm",
	"{{env.HOME}}/Library/pnpm",
	"{{env.HOME}}/.local/bin",
]

# --- 终端颜色强制开启 ---
COLORTERM = "truecolor"

HOMEBREW_NO_ENV_HINTS = "1"
HOMEBREW_NO_INSTALL_CLEANUP = "1"

# --- Setup Pipeline ---
[tasks.setup]
description = "安装基础环境并同步配置"
depends = [
	"setup:tools",
	"setup:apps",
	"setup:git",
	"setup:config",
	"setup:ssh",
	"setup:ghostty",
	"setup:shell",
]
run = """
echo "📋 Setup 摘要"
echo "✅ 基础环境已完成；如需让当前终端立即生效，请执行 'source ~/.zshrc'。"
"""

[tasks."setup:full"]
description = "安装完整开发环境（基础环境 + Java + Rust + AI）"
depends = [
	"setup",
	"setup:java",
	"setup:rust",
	"setup:ai",
]
run = """
echo "📋 Full Setup 摘要"
echo "✅ 完整环境已完成；如需让当前终端立即生效，请执行 'source ~/.zshrc'。"
"""

[tasks."setup:tools"]
description = "安装基础 mise 工具与 uv tool"
hide = true
run = """
echo "🔧 同步基础 mise 工具链与 uv tool..."
# 这里显式列基础工具，而不是直接 `mise install`，
# 否则会把 [tools] 里声明但希望按需安装的 Java / Rust 也一并装上。
mise install \
  go \
  node \
  python \
  pnpm \
  uv \
  atuin \
  lazygit \
  starship \
  github:urzeye/lazyssh \
  fd \
  fzf \
  zoxide \
  ripgrep \
  bat \
  eza \
  jq \
  shellcheck \
  actionlint \
  usage \
  gh \
  delta \
  yq \
  just \
  bottom \
  gping \
  tlrc \
  watchexec

# httpie 缺失时再安装，避免每次 setup 都触发无意义的升级检查与噪音输出。
if ! uv tool list | grep -q '^httpie '; then
  uv tool install httpie
else
  echo "httpie is already installed"
fi

echo "✅ 基础工具链已同步。"
"""

[tasks."setup:java"]
description = "安装 Java 与 Maven"
run = """
echo "☕️ 同步 Java 与 Maven..."
mise install java maven
echo "✅ Java 与 Maven 已同步。"
"""

[tasks."setup:rust"]
description = "安装 Rust 与 tokei"
run = """
echo "🦀 同步 Rust 与 tokei..."
mise install rust tokei
echo "✅ Rust 与 tokei 已同步。"
"""

[tasks."setup:apps"]
description = "同步当前平台的系统应用与插件"
hide = true
run = """
case "$(uname -s)" in
  Darwin) mise run setup:apps:darwin ;;
  Linux) echo "📦 Linux 系统依赖由 bootstrap/linux.sh 负责；setup 中跳过系统包安装。" ;;
  *) echo "Unsupported OS: $(uname -s)"; exit 1 ;;
esac
"""

[tasks."setup:apps:darwin"]
description = "通过 Brewfile 同步 macOS 应用、字体与插件"
hide = true
run = """
echo "📦 通过 Brewfile 同步 Homebrew 应用、字体与插件..."
if ! command -v brew >/dev/null 2>&1; then
  echo "Homebrew is required for setup:apps:darwin"
  exit 1
fi

BREWFILE="$HOME/.Brewfile"

# 首次 setup 时 dotfiles 可能还没 apply，允许直接使用 chezmoi 源目录里的 Brewfile。
if [ ! -f "$BREWFILE" ] && command -v chezmoi >/dev/null 2>&1; then
  SOURCE_BREWFILE="$(chezmoi source-path)/dot_Brewfile"
  [ -f "$SOURCE_BREWFILE" ] && BREWFILE="$SOURCE_BREWFILE"
fi

if [ ! -f "$BREWFILE" ]; then
  echo "Brewfile not found: $BREWFILE"
  exit 1
fi

brew bundle install --file="$BREWFILE" --no-upgrade

echo "✅ Homebrew 应用、字体与插件已同步。"
"""

[tasks."setup:git"]
description = "同步 GitHub CLI 默认配置"
hide = true
depends = ["setup:tools"]
run = """
echo "🔀 同步 GitHub CLI 默认配置..."

# GitHub CLI 只设置非交互选项，避免 setup 被登录流程卡住。
if command -v gh >/dev/null 2>&1; then
  gh config set editor "${VISUAL:-${EDITOR:-vim}}"
fi

echo "✅ gh 配置已同步。"
"""

[tasks."setup:config"]
description = "安全应用由 chezmoi 管理的 dotfiles"
hide = true
depends = ["setup:apps"]
run = """
echo "🧩 应用 chezmoi 管理的配置..."

if ! command -v chezmoi >/dev/null 2>&1; then
  echo "chezmoi is required for setup:config"
  exit 1
fi

CHEZMOI_SOURCE_DIR="$(chezmoi source-path)"

# dotfiles 现在以 chezmoi 仓库为准；仓库尚未初始化时仅提示，不阻断工具安装流程。
if [ ! -d "$CHEZMOI_SOURCE_DIR/.git" ]; then
  echo "⚠️ 未检测到 chezmoi 仓库，跳过 dotfiles 应用。"
else
  chezmoi apply
  echo "✅ chezmoi 配置已应用。"
fi
"""

[tasks."setup:config:force"]
description = "强制覆盖目标文件并应用 chezmoi dotfiles"
hide = true
depends = ["setup:apps"]
run = """
echo "🧨 强制应用 chezmoi 管理的配置..."

if ! command -v chezmoi >/dev/null 2>&1; then
  echo "chezmoi is required for setup:config:force"
  exit 1
fi

CHEZMOI_SOURCE_DIR="$(chezmoi source-path)"

if [ ! -d "$CHEZMOI_SOURCE_DIR/.git" ]; then
  echo "⚠️ 未检测到 chezmoi 仓库，跳过强制应用。"
else
  chezmoi apply --force
  echo "✅ chezmoi 配置已强制应用。"
fi
"""

[tasks."setup:ssh"]
description = "初始化由 lazyssh 管理的本地 SSH 配置"
hide = true
depends = ["setup:config"]
run = """
echo "🔐 初始化 SSH 工作流..."

mkdir -p "$HOME/.ssh" "$HOME/.ssh/config.d"
chmod 700 "$HOME/.ssh"

LOCAL_SSH_CONFIG="$HOME/.ssh/config.local"

if [ ! -f "$LOCAL_SSH_CONFIG" ]; then
  cat > "$LOCAL_SSH_CONFIG" <<'EOF'
# Managed by you and lazyssh. This file is intentionally not managed by chezmoi.
# ~/.ssh/config includes this file, plus config.d and OrbStack when present.

# Add your SSH hosts below, or manage them with lazyssh.
EOF
  chmod 600 "$LOCAL_SSH_CONFIG"
  echo "✅ 已创建 ~/.ssh/config.local，可直接用 lazyssh 管理。"
else
  chmod 600 "$LOCAL_SSH_CONFIG" 2>/dev/null || true
  echo "✅ 检测到现有 ~/.ssh/config.local，已保留。"
fi
"""

[tasks."setup:ghostty"]
description = "校验 Ghostty 配置"
hide = true
depends = ["setup:apps", "setup:config"]
run = """
case "$(uname -s)" in
  Darwin)
    if command -v ghostty >/dev/null 2>&1; then
      echo "👻 校验 Ghostty 配置..."
      ghostty +validate-config >/dev/null
      echo "✅ Ghostty 配置已校验。"
    else
      echo "👻 Ghostty 未安装，跳过配置校验。"
    fi
    ;;
  Linux)
    echo "👻 Linux 环境跳过 Ghostty 校验。"
    ;;
  *)
    echo "Unsupported OS: $(uname -s)"
    exit 1
    ;;
esac
"""

[tasks."setup:ai"]
description = "使用 pnpm 全局安装 AI 相关命令行工具链"
depends = ["setup:tools"]
run = """
echo "🤖 同步 AI CLI 工具链..."
mkdir -p "$PNPM_HOME"
pnpm config set --global global-bin-dir "$PNPM_HOME"
pnpm add -g @anthropic-ai/claude-code @openai/codex @google/gemini-cli @fission-ai/openspec@latest
echo "✅ AI 工具链已安装！请运行 'hash -r' 或重启终端。"
"""

[tasks."setup:shell"]
description = "校验受管 shell 配置是否就位"
hide = true
depends = ["setup:tools", "setup:apps", "setup:config"]
run = """
echo "🐚 校验受管 shell 配置..."
[ -f "$HOME/.zshrc" ] || { echo "~/.zshrc is missing"; exit 1; }
[ -f "$HOME/.config/zsh/shell.zsh" ] || { echo "~/.config/zsh/shell.zsh is missing"; exit 1; }
[ -f "$HOME/.config/zsh/common.zsh" ] || { echo "~/.config/zsh/common.zsh is missing"; exit 1; }
echo "✅ Shell 配置已就位。"
"""

[settings]
experimental = true
plugin_autoupdate_last_check_duration = "24h"
trusted_config_paths = ["~/.local/share/chezmoi"]
