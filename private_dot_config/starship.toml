"$schema" = "https://starship.rs/config-schema.json"
add_newline = true

# 第一行展示目录、Git 状态、当前语言/包管理信息与耗时；第二行只留输入光标。
format = "$directory$git_branch$git_status$fill$python$nodejs$golang$java$rust$package$cmd_duration$line_break$character"

[directory]
style = "bold cyan"
truncation_length = 3

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style) )"

[fill]
symbol = " "

[cmd_duration]
min_time = 2000
style = "yellow"
format = "took [$duration]($style) "

[python]
symbol = " "
style = "bold yellow"
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"

[golang]
symbol = " "
style = "bold cyan"
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"

[java]
symbol = " "
style = "bold red"
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"

[rust]
symbol = " "
style = "bold 208"
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"

[package]
symbol = "󰏗 "
style = "bold 208"
format = "pkg [$symbol$version]($style) "
version_format = "v${raw}"
