"$schema" = "https://starship.rs/config-schema.json"
add_newline = true

# 第一行展示目录、Git 状态、语言/包管理信息与时间/耗时；
# 第二行展示主机、shell、sudo 上下文与输入光标。
format = "$directory$git_branch$git_state$git_status$fill$python$nodejs$golang$java$rust$package$time$cmd_duration$status$line_break$hostname$shell$sudo$jobs$character"

[directory]
style = "bold cyan"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "bold red"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[git_branch]
symbol = " "
style = "bold purple"

[git_state]
style = "bold yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style) )"

[fill]
symbol = " "

[cmd_duration]
min_time = 2000
style = "yellow"
format = "took [$duration]($style) "

[time]
disabled = false
time_format = "%R"
style = "bold dimmed white"
format = "at [$time]($style) "

[status]
disabled = false
style = "bold red"
format = "[$status]($style) "
pipestatus = true

[hostname]
ssh_only = true
format = "[$ssh_symbol$hostname]($style) "
style = "bold dimmed green"

[shell]
disabled = false
format = "[$indicator]($style) "
style = "bold dimmed white"
bash_indicator = "bash"
zsh_indicator = "zsh"
fish_indicator = "fish"
unknown_indicator = "zsh"

[sudo]
disabled = false
format = "[$symbol]($style) "
symbol = "sudo"
style = "bold yellow"

[jobs]
symbol = "✦ "
style = "bold blue"
symbol_threshold = 1
number_threshold = 2
format = "[$symbol$number]($style) "

[python]
symbol = " "
style = "bold yellow"
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"

[golang]
symbol = " "
style = "bold cyan"
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"

[java]
symbol = " "
style = "bold red"
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"

[rust]
symbol = " "
style = "bold 208"
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"

[package]
symbol = "󰏗 "
style = "bold 208"
format = "pkg [$symbol$version]($style) "
version_format = "v${raw}"
